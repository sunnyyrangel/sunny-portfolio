<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0faf8"/>
      <stop offset="100%" style="stop-color:#e8f6f4"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1a2949" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2949" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#1a2949" opacity="0.04"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots)"/>

  <!-- Badge -->
  <rect x="250" y="40" width="300" height="36" rx="18" fill="#00c8b7" opacity="0.15"/>
  <text x="400" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#00c8b7" text-anchor="middle" letter-spacing="1.5">CAREER SUPPORT</text>

  <!-- Card mockup -->
  <rect x="120" y="100" width="560" height="360" rx="20" fill="white" filter="url(#shadow)"/>

  <!-- Header area -->
  <text x="160" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1a2949">Your Career Toolkit</text>
  <text x="160" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280">Everything you need to land and grow your career.</text>

  <!-- Service cards -->
  <rect x="160" y="190" width="225" height="100" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <rect x="176" y="206" width="40" height="40" rx="10" fill="#0067a2" opacity="0.12"/>
  <text x="196" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle">&#128196;</text>
  <text x="230" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1a2949">Resume Building</text>
  <text x="230" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7280">Professional templates</text>
  <text x="230" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7280">&amp; 1-on-1 review</text>

  <rect x="400" y="190" width="240" height="100" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <rect x="416" y="206" width="40" height="40" rx="10" fill="#00c8b7" opacity="0.12"/>
  <text x="436" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle">&#127908;</text>
  <text x="470" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1a2949">Mock Interviews</text>
  <text x="470" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7280">Practice with real</text>
  <text x="470" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7280">hiring scenarios</text>

  <rect x="160" y="306" width="225" height="100" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <rect x="176" y="322" width="40" height="40" rx="10" fill="#fa8526" opacity="0.12"/>
  <text x="196" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle">&#128188;</text>
  <text x="230" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1a2949">Job Board</text>
  <text x="230" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7280">Curated opportunities</text>
  <text x="230" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7280">from vetted employers</text>

  <rect x="400" y="306" width="240" height="100" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <rect x="416" y="322" width="40" height="40" rx="10" fill="#1a2949" opacity="0.08"/>
  <text x="436" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle">&#127891;</text>
  <text x="470" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1a2949">Thriver Pathways</text>
  <text x="470" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7280">Career readiness</text>
  <text x="470" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7280">cohort program</text>

  <!-- Bottom bar -->
  <rect x="160" y="424" width="480" height="24" rx="8" fill="#00c8b7" opacity="0.08"/>
  <text x="400" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#00c8b7" text-anchor="middle">Powered by Staffmark Group Partnership</text>
</svg>
