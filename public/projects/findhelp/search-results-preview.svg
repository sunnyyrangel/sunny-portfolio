<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#edf4fc"/>
      <stop offset="100%" style="stop-color:#e8f0fa"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1a2949" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2949" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#1a2949" opacity="0.04"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots)"/>

  <!-- Badge -->
  <rect x="250" y="40" width="300" height="36" rx="18" fill="#0067a2" opacity="0.12"/>
  <text x="400" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0067a2" text-anchor="middle" letter-spacing="1.5">SEARCH RESULTS</text>

  <!-- Card mockup -->
  <rect x="120" y="100" width="560" height="360" rx="20" fill="white" filter="url(#shadow)"/>

  <!-- Category tabs -->
  <rect x="160" y="120" width="100" height="28" rx="14" fill="#0067a2"/>
  <text x="210" y="139" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">Housing</text>
  <rect x="270" y="120" width="70" height="28" rx="14" fill="#f3f4f6"/>
  <text x="305" y="139" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6b7280" text-anchor="middle">Food</text>
  <rect x="350" y="120" width="90" height="28" rx="14" fill="#f3f4f6"/>
  <text x="395" y="139" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6b7280" text-anchor="middle">Healthcare</text>
  <rect x="450" y="120" width="70" height="28" rx="14" fill="#f3f4f6"/>
  <text x="485" y="139" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6b7280" text-anchor="middle">Jobs</text>

  <!-- Results count -->
  <text x="160" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Showing <tspan font-weight="700" fill="#1a2949">31 programs</tspan> near 90011</text>

  <!-- Program Card 1 -->
  <rect x="160" y="194" width="480" height="96" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <rect x="176" y="210" width="64" height="64" rx="10" fill="#0067a2" opacity="0.1"/>
  <text x="208" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="22" text-anchor="middle">🏠</text>
  <text x="256" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1a2949">LA County Housing Authority</text>
  <text x="256" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7280">Section 8 vouchers · Rental assistance · Emergency housing</text>
  <rect x="256" y="258" width="52" height="18" rx="9" fill="#00c8b7" opacity="0.15"/>
  <text x="282" y="271" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#00c8b7" text-anchor="middle">Open</text>
  <text x="320" y="271" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">· 2.3 mi away</text>

  <!-- Program Card 2 -->
  <rect x="160" y="302" width="480" height="96" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <rect x="176" y="318" width="64" height="64" rx="10" fill="#fa8526" opacity="0.1"/>
  <text x="208" y="356" font-family="system-ui, -apple-system, sans-serif" font-size="22" text-anchor="middle">🏡</text>
  <text x="256" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1a2949">PATH - People Assisting The Homeless</text>
  <text x="256" y="356" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7280">Transitional housing · Case management · Youth programs</text>
  <rect x="256" y="366" width="52" height="18" rx="9" fill="#00c8b7" opacity="0.15"/>
  <text x="282" y="379" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#00c8b7" text-anchor="middle">Open</text>
  <text x="320" y="379" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">· 4.1 mi away</text>

  <!-- More results hint -->
  <rect x="160" y="410" width="480" height="32" rx="10" fill="#f9fafb"/>
  <text x="400" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0067a2" text-anchor="middle">+ 29 more programs</text>
</svg>
