<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0faf8"/>
      <stop offset="100%" style="stop-color:#e8f6f4"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1a2949" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2949" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#1a2949" opacity="0.04"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots)"/>

  <!-- Badge -->
  <rect x="240" y="40" width="320" height="36" rx="18" fill="#0067a2" opacity="0.12"/>
  <text x="400" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0067a2" text-anchor="middle" letter-spacing="1.5">SUPPORT REQUEST</text>

  <!-- Card mockup -->
  <rect x="120" y="100" width="560" height="360" rx="20" fill="white" filter="url(#shadow)"/>

  <!-- Form header -->
  <text x="160" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1a2949">How can we help?</text>
  <text x="160" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280">Tell us what you need and we'll connect you.</text>

  <!-- Form field 1 - Name -->
  <text x="160" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1a2949">Your Name</text>
  <rect x="160" y="210" width="480" height="40" rx="8" fill="#f5f5f5"/>
  <text x="180" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9ca3af">Enter your name...</text>

  <!-- Form field 2 - What do you need help with -->
  <text x="160" y="274" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1a2949">What do you need help with?</text>
  <rect x="160" y="282" width="480" height="40" rx="8" fill="#f5f5f5"/>
  <text x="180" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9ca3af">Select a category...</text>
  <!-- Dropdown arrow -->
  <path d="M620 300 L626 308 L632 300" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>

  <!-- Category pills -->
  <rect x="160" y="338" width="90" height="28" rx="14" fill="#0067a2" opacity="0.1"/>
  <text x="205" y="357" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0067a2" text-anchor="middle">Housing</text>

  <rect x="260" y="338" width="110" height="28" rx="14" fill="#00c8b7" opacity="0.12"/>
  <text x="315" y="357" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#00c8b7" text-anchor="middle">Employment</text>

  <rect x="380" y="338" width="100" height="28" rx="14" fill="#fa8526" opacity="0.12"/>
  <text x="430" y="357" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#fa8526" text-anchor="middle">Education</text>

  <rect x="490" y="338" width="80" height="28" rx="14" fill="#1a2949" opacity="0.08"/>
  <text x="530" y="357" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1a2949" text-anchor="middle">Other</text>

  <!-- Submit button -->
  <rect x="160" y="390" width="200" height="44" rx="22" fill="#0067a2"/>
  <text x="260" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">Submit Request</text>

  <!-- Checkmark accent -->
  <circle cx="600" y="412" r="16" fill="#00c8b7" opacity="0.15"/>
  <path d="M592 412 L598 418 L610 406" fill="none" stroke="#00c8b7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
