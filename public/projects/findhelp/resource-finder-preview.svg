<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0faf9"/>
      <stop offset="100%" style="stop-color:#e8f4fc"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1a2949" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2949" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#1a2949" opacity="0.04"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots)"/>

  <!-- Badge -->
  <rect x="240" y="40" width="320" height="36" rx="18" fill="#00c8b7" opacity="0.15"/>
  <text x="400" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#00c8b7" text-anchor="middle" letter-spacing="1.5">RESOURCE FINDER</text>

  <!-- Card mockup -->
  <rect x="120" y="100" width="560" height="360" rx="20" fill="white" filter="url(#shadow)"/>

  <!-- Search bar -->
  <rect x="160" y="132" width="48" height="48" rx="14" fill="#1a2949"/>
  <circle cx="184" cy="156" r="10" fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="191" y1="163" x2="197" y2="169" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <rect x="222" y="132" width="420" height="48" rx="10" fill="#f5f5f5"/>
  <text x="248" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#9ca3af">Enter your ZIP code...</text>

  <!-- Result rows -->
  <rect x="160" y="208" width="480" height="56" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <text x="188" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1a2949">Food &amp; Nutrition</text>
  <text x="604" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0067a2" text-anchor="end">48 programs</text>

  <rect x="160" y="278" width="480" height="56" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <text x="188" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1a2949">Housing &amp; Shelter</text>
  <text x="604" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0067a2" text-anchor="end">31 programs</text>

  <rect x="160" y="348" width="480" height="56" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <text x="188" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1a2949">Healthcare</text>
  <text x="604" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0067a2" text-anchor="end">27 programs</text>

  <rect x="160" y="418" width="480" height="32" rx="10" fill="#f9fafb"/>
  <text x="400" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0067a2" text-anchor="middle">+ 5 more categories</text>
</svg>
