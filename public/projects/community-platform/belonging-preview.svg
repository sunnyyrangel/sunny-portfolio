<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4fa"/>
      <stop offset="100%" style="stop-color:#edf0f7"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1a2949" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2949" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#1a2949" opacity="0.04"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots)"/>

  <!-- Badge -->
  <rect x="240" y="40" width="320" height="36" rx="18" fill="#fa8526" opacity="0.15"/>
  <text x="400" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fa8526" text-anchor="middle" letter-spacing="1.5">COMMUNITY FEED</text>

  <!-- Card mockup -->
  <rect x="120" y="100" width="560" height="360" rx="20" fill="white" filter="url(#shadow)"/>

  <!-- Post 1 -->
  <rect x="160" y="126" width="480" height="100" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <!-- Avatar -->
  <circle cx="192" cy="152" r="18" fill="#0067a2"/>
  <text x="192" y="157" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">JM</text>
  <!-- Post content -->
  <text x="222" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1a2949">Jordan M.</text>
  <text x="300" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9ca3af">2 hours ago</text>
  <text x="222" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4b5563">Just got accepted into my dream school!</text>
  <text x="222" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4b5563">This community helped me through every step. 💛</text>
  <!-- Reactions -->
  <text x="222" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9ca3af">❤️ 24  · 💬 8 replies</text>

  <!-- Post 2 -->
  <rect x="160" y="242" width="480" height="100" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <circle cx="192" cy="268" r="18" fill="#00c8b7"/>
  <text x="192" y="273" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">AT</text>
  <text x="222" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1a2949">Aaliyah T.</text>
  <text x="304" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9ca3af">5 hours ago</text>
  <text x="222" y="286" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4b5563">Anyone in the LA area want to meet up this</text>
  <text x="222" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4b5563">weekend? Would love to connect in person!</text>
  <text x="222" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9ca3af">❤️ 12  · 💬 15 replies</text>

  <!-- Post 3 preview -->
  <rect x="160" y="358" width="480" height="64" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <circle cx="192" cy="390" r="18" fill="#fa8526"/>
  <text x="192" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">KR</text>
  <text x="222" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1a2949">Keisha R.</text>
  <text x="300" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9ca3af">Yesterday</text>
  <text x="222" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4b5563">Sharing my story on Thriver Stories was life-changing...</text>
</svg>
