<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef7f0"/>
      <stop offset="100%" style="stop-color:#fdf2e9"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1a2949" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2949" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#1a2949" opacity="0.04"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots)"/>

  <!-- Badge -->
  <rect x="250" y="40" width="300" height="36" rx="18" fill="#fa8526" opacity="0.15"/>
  <text x="400" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fa8526" text-anchor="middle" letter-spacing="1.5">THRIVER STORIES</text>

  <!-- Card mockup -->
  <rect x="120" y="100" width="560" height="360" rx="20" fill="white" filter="url(#shadow)"/>

  <!-- Video thumbnail placeholder -->
  <rect x="160" y="132" width="480" height="160" rx="12" fill="#1a2949"/>
  <!-- Play button -->
  <circle cx="400" cy="212" r="28" fill="white" opacity="0.9"/>
  <polygon points="392,198 392,226 416,212" fill="#1a2949"/>
  <!-- Duration badge -->
  <rect x="592" y="264" width="48" height="22" rx="6" fill="black" opacity="0.6"/>
  <text x="616" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">12:34</text>

  <!-- Episode info -->
  <rect x="160" y="310" width="76" height="24" rx="12" fill="#fa8526" opacity="0.15"/>
  <text x="198" y="327" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#fa8526" text-anchor="middle">Ep. 25</text>

  <text x="160" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1a2949">"From Aging Out to Owning My Story"</text>
  <text x="160" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280">How one community member turned their foster care</text>
  <text x="160" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280">experience into a platform for advocacy and change.</text>

  <!-- Watch link -->
  <text x="160" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0067a2">Watch full episode &#8594;</text>
</svg>
