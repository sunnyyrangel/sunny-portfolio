<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4fa"/>
      <stop offset="100%" style="stop-color:#edf0f7"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1a2949" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2949" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#1a2949" opacity="0.04"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots)"/>

  <!-- Badge -->
  <rect x="260" y="40" width="280" height="36" rx="18" fill="#1a2949" opacity="0.1"/>
  <text x="400" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1a2949" text-anchor="middle" letter-spacing="1.5">ANNOUNCEMENTS</text>

  <!-- Card mockup -->
  <rect x="120" y="100" width="560" height="360" rx="20" fill="white" filter="url(#shadow)"/>

  <!-- Pinned badge -->
  <rect x="160" y="128" width="72" height="26" rx="13" fill="#fa8526" opacity="0.15"/>
  <text x="196" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#fa8526" text-anchor="middle">PINNED</text>

  <!-- Announcement title -->
  <text x="160" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a2949">Free Tax Filing Support Is Here!</text>

  <!-- Announcement body lines -->
  <text x="160" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280" letter-spacing="0.2">Tax season is open and we've got you covered. Foster</text>
  <text x="160" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280" letter-spacing="0.2">Greatness is offering free tax prep support — including</text>
  <text x="160" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280" letter-spacing="0.2">help claiming the Foster Youth Tax Credit (FYTC).</text>

  <!-- CTA button -->
  <rect x="160" y="282" width="200" height="40" rx="20" fill="#0067a2"/>
  <text x="260" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">Get Tax Support</text>

  <!-- Divider -->
  <line x1="160" y1="344" x2="640" y2="344" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Second announcement preview -->
  <rect x="160" y="362" width="56" height="22" rx="11" fill="#00c8b7" opacity="0.15"/>
  <text x="188" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#00c8b7" text-anchor="middle">NEW</text>

  <text x="160" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1a2949">Thriver Pathways: First Cohort Results</text>
  <text x="160" y="434" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9ca3af">Our first career readiness cohort just wrapped up...</text>
</svg>
