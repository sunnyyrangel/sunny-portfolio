<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#edf4fc"/>
      <stop offset="100%" style="stop-color:#e8f0fa"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1a2949" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2949" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#1a2949" opacity="0.04"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots)"/>

  <!-- Badge -->
  <rect x="250" y="40" width="300" height="36" rx="18" fill="#0067a2" opacity="0.12"/>
  <text x="400" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0067a2" text-anchor="middle" letter-spacing="1.5">UPCOMING EVENTS</text>

  <!-- Card mockup -->
  <rect x="120" y="100" width="560" height="360" rx="20" fill="white" filter="url(#shadow)"/>

  <!-- Event 1 -->
  <rect x="160" y="130" width="480" height="88" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <!-- Date block -->
  <rect x="176" y="144" width="56" height="60" rx="10" fill="#0067a2"/>
  <text x="204" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle" opacity="0.8">APR</text>
  <text x="204" y="194" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">12</text>
  <!-- Event details -->
  <text x="252" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1a2949">Community Cooking Night</text>
  <text x="252" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Virtual  &#183;  6:00 PM PST  &#183;  Free</text>
  <rect x="252" y="192" width="60" height="20" rx="10" fill="#00c8b7" opacity="0.15"/>
  <text x="282" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#00c8b7" text-anchor="middle">RSVP'd</text>

  <!-- Event 2 -->
  <rect x="160" y="234" width="480" height="88" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <rect x="176" y="248" width="56" height="60" rx="10" fill="#fa8526"/>
  <text x="204" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle" opacity="0.8">APR</text>
  <text x="204" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">19</text>
  <text x="252" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1a2949">Financial Literacy Workshop</text>
  <text x="252" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Virtual  &#183;  5:00 PM PST  &#183;  Free</text>
  <rect x="252" y="296" width="72" height="20" rx="10" fill="#0067a2" opacity="0.12"/>
  <text x="288" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#0067a2" text-anchor="middle">Open Seats</text>

  <!-- Event 3 -->
  <rect x="160" y="338" width="480" height="88" rx="14" fill="#f9fafb" filter="url(#shadow-sm)"/>
  <rect x="176" y="352" width="56" height="60" rx="10" fill="#1a2949"/>
  <text x="204" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle" opacity="0.8">MAY</text>
  <text x="204" y="402" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">03</text>
  <text x="252" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1a2949">Open Mic &amp; Connection Night</text>
  <text x="252" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Virtual  &#183;  7:00 PM PST  &#183;  Free</text>
  <rect x="252" y="400" width="72" height="20" rx="10" fill="#0067a2" opacity="0.12"/>
  <text x="288" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#0067a2" text-anchor="middle">Open Seats</text>
</svg>
